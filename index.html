        footer { text-align: center; padding: 60px 20px; color: #888; font-size: 14px; font-weight: 900; }
    </style>

<body>

    <canvas id="bg-canvas"></canvas>

                <p style="font-size: 14px; font-weight: 900; opacity: 0.9;">OFFICIAL CHANNEL</p>

    <script>
        // د بګراونډ د ذراتو کوډ
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            for (let i = 0; i < 100; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas(); createParticles(); animate();

        // ژبه
        function toggleLang() { document.getElementById('langBox').classList.toggle('show'); }
        const langData = {
            en: { title: "TOPAK PRO", sub: "ELITE MODDING SOLUTIONS", khanB: "VIEW DETAILS", furyB: "VIEW DETAILS", buyB: "BUY ACCESS NOW", join: "JOIN TELEGRAM" },
            ps: { title: "ټوپک پرو", sub: "د هیکونو ځانګړی مرکز", khanB: "معلومات وګورئ", furyB: "معلومات وګورئ", buyB: "اوس یې واخلئ", join: "چینل ته ورشئ" },
            ar: { title: "توباك برو", sub: "حلول التعديل النخبوية", khanB: "عرض التفاصيل", furyB: "عرض التفاصيل", buyB: "شراء الآن", join: "انضم إلينا" },
            zh: { title: "TOPAK 商店", sub: "顶级修改方案", khanB: "查看详情", furyB: "查看详情", buyB: "立即购买", join: "加入电报" }
        };

        function changeLang(l) {
            document.getElementById('title').innerText = langData[l].title;
            document.getElementById('subtitle').innerText = langData[l].sub;
            document.getElementById('khan-b').innerHTML = `<i class="fas fa-fire"></i> ` + langData[l].khanB;
            document.getElementById('fury-b').innerHTML = `<i class="fas fa-fire"></i> ` + langData[l].furyB;
            document.getElementById('buy-b').innerText = langData[l].buyB;
            document.getElementById('tg-join').innerText = langData[l].join;
            document.body.dir = (l === 'ps' || l === 'ar') ? 'rtl' : 'ltr';
            document.getElementById('langBox').classList.remove('show');
        }
    </script>
