<!DOCTYPE html>
<html lang="ps">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPAK PRO | PREMIUM STORE</title>
    <style>
        /* شالید او خوځنده رڼاګانې */
        body {
            background: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* د شالید ډیزاین (Moving Background) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 0, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 0, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        /* متحرک ستوري/ذرات */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: moveBg 50s linear infinite;
        }

        @keyframes moveBg {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .header h1 {
            color: #ff0000;
            font-size: 55px;
            margin-bottom: 0;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }

        .header p {
            color: #fff;
            font-size: 16px;
            letter-spacing: 6px;
            margin-top: 5px;
            font-weight: bold;
            background: rgba(255, 0, 0, 0.2);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 50px;
        }

        hr { border: none; height: 1px; background: linear-gradient(90deg, transparent, red, transparent); margin: 40px 0; }

        .container { max-width: 400px; margin: auto; }

        /* VIP کارتونه */
        .card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px 20px;
            margin-bottom: 35px;
            transition: 0.4s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }

        .card h2 { font-size: 30px; margin: 0; font-weight: 800; }
        .card .version { color: #aaa; font-size: 14px; margin: 10px 0; letter-spacing: 2px; }
        .card .safe { 
            color: #00ff00; 
            font-weight: bold; 
            font-size: 1.2rem; 
            display: block; 
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        /* تڼۍ */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 800;
            margin-bottom: 12px;
            box-sizing: border-box;
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-white { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .btn-green { background: #00ff00; color: #000; box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
        .btn-red { background: #ff0000; color: #fff; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); }
        
        .btn-outline { 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div class="header">
        <h1>TOPAK PRO</h1>
        <p>PUBGM STORE</p>
    </div>

    <hr>

    <div class="container">
        
        <div class="card" style="border-top: 4px solid #fff;">
            <h2>KHAN LOADER 4.3</h2>
            <div class="version">GL | KR | VNG | TW</div>
            <span class="safe">✓ FULL SAFE</span>
            <a href="#" class="btn btn-white">BUY NOW</a>
            <a href="#" class="btn btn-outline">PRICE LIST</a>
        </div>

        <div class="card" style="border-top: 4px solid #00ff00;">
            <h2 style="color: #00ff00;">FURY LOADER 4.3</h2>
            <div class="version">GL | KR | VNG | TW</div>
            <span class="safe">✓ FULL SAFE</span>
            <a href="#" class="btn btn-green">BUY NOW</a>
            <a href="#" class="btn btn-outline">PRICE LIST</a>
        </div>

        <div class="card" style="border-top: 4px solid #ff0000;">
            <h2 style="color: #ff0000;">ALI PRO MOD 4.3</h2>
            <div class="version">GL | KR | VNG | TW</div>
            <span class="safe">✓ FULL SAFE</span>
            <a href="#" class="btn btn-red">BUY NOW</a>
            <a href="#" class="btn btn-outline">PRICE LIST</a>
        </div>

    </div>

    <footer style="color: #666; font-size: 12px; margin: 40px 0;">
        © 2026 TOPAK PRO | ALL RIGHTS RESERVED
    </footer>

</body>
</html>
