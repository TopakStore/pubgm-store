<!DOCTYPE html>
<html lang="ps">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPAK PRO | PREMIUM STORE</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 0, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 0, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: moveBg 50s linear infinite;
        }

        @keyframes moveBg {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .header h1 {
            color: #ff0000;
            font-size: 50px;
            margin-bottom: 0;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }

        .header p {
            color: #fff;
            font-size: 14px;
            letter-spacing: 5px;
            margin-top: 5px;
            font-weight: bold;
            background: rgba(255, 0, 0, 0.3);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
        }

        hr { border: none; height: 1px; background: linear-gradient(90deg, transparent, red, transparent); margin: 30px 0; }

        .container { max-width: 400px; margin: auto; }

        .card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 25px 20px;
            margin-bottom: 30px;
            transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .card h2 { font-size: 28px; margin: 0; font-weight: 800; text-transform: uppercase; }
        .card .version { color: #999; font-size: 13px; margin: 10px 0; letter-spacing: 2px; }
        .card .safe { color: #00ff00; font-weight: bold; font-size: 1.1rem; display: block; margin-bottom: 20px; }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            margin-bottom: 10px;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-white { background: #fff; color: #000; }
        .btn-green { background: #00ff00; color: #000; }
        .btn-red { background: #ff0000; color: #fff; }
        .btn-outline { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; }

        /* ستا د چینل لپاره شنه تڼۍ په پای کې */
        .channel-btn {
            display: inline-block;
            background: #24A1DE;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(36, 161, 222, 0.4);
            transition: 0.3s;
        }
        .channel-btn:hover { transform: scale(1.1); background: #1c82b3; }

    </style>
</head>
<body>

    <div class="bg-animate"></div>

    </div>

    <hr>

    <div class="container">
        
        <div class="card" style="border-top: 4px solid #fff;">
            <h2>KHAN LOADER 4.3</h2>
            <div class="version">GL | KR | VNG | TW</div>
            <span class="safe">✓ FULL SAFE</span>
            <a href="https://t.me/TOPAK1V" class="btn btn-white">BUY NOW</a>
            <a href="https://t.me/TOPAK919/59" class="btn btn-outline">PRICE LIST</a>
        </div>

        <div class="card" style="border-top: 4px solid #00ff00;">
            <h2 style="color: #00ff00;">FURY LOADER 4.3</h2>
            <div class="version">GL | KR | VNG | TW</div>
            <span class="safe">✓ FULL SAFE</span>
            <a href="https://t.me/TOPAK1V" class="btn btn-green">BUY NOW</a>
            <a href="https://t.me/TOPAK919/59" class="btn btn-outline">PRICE LIST</a>
        </div>

        <div class="card" style="border-top: 4px solid #ff0000;">
            <h2 style="color: #ff0000;">ALI PRO MOD 4.3</h2>
            <div class="version">GL | KR | VNG | TW</div>
            <span class="safe">✓ FULL SAFE</span>
            <a href="https://t.me/TOPAK1V" class="btn btn-red">BUY NOW</a>
            <a href="https://t.me/TOPAK919/59" class="btn btn-outline">PRICE LIST</a>
        </div>

        <a href="https://t.me/TOPAK3CHEATS" class="channel-btn">JOIN TELEGRAM CHANNEL</a>

    </div>

    <footer style="color: #555; font-size: 11px; margin: 40px 0; letter-spacing: 2px;">
        © 2026 TOPAK STORE OFFICIAL
    </footer>

</body>
</html>
